<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retro Hockey Manager — Coming soon | Pakki-Pakki Gaming</title>
    <meta
      name="description"
      content="Retro Hockey Manager is coming soon from Pakki-Pakki Gaming, an independent game studio in Finland."
    >
    <meta name="theme-color" content="#eef6f9">
    <link rel="canonical" href="https://spjass.github.io/pakki-pakki-gaming/">
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link
      rel="preload"
      href="./assets/fonts/saira-condensed-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    >
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://spjass.github.io/pakki-pakki-gaming/">
    <meta property="og:title" content="Retro Hockey Manager — Coming soon">
    <meta
      property="og:description"
      content="Retro Hockey Manager is coming soon."
    >
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="Pakki-Pakki Gaming">
    <meta
      property="og:image"
      content="https://spjass.github.io/pakki-pakki-gaming/assets/retro-hockey-manager-logo.png"
    >
    <meta property="og:image:width" content="1774">
    <meta property="og:image:height" content="887">
    <meta property="og:image:alt" content="Retro Hockey Manager logo">
    <link rel="stylesheet" href="./styles.css">
    <script src="./site.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="accessibility.skip">Skip to teaser</a>

    <header class="site-header">
      <a class="studio-lockup" href="#main" aria-label="Pakki-Pakki Gaming" data-i18n-aria="brand.homeLabel">
        <img
          src="./assets/pakki-pakki-gaming-logo.png"
          width="2172"
          height="724"
          alt="Pakki-Pakki Gaming"
          fetchpriority="high"
        >
      </a>

      <div class="locale-switch" role="group" aria-label="Choose language" data-i18n-aria="locale.aria">
        <button type="button" data-locale="en" aria-pressed="true">EN</button>
        <span aria-hidden="true">/</span>
        <button type="button" data-locale="fi" aria-pressed="false">FI</button>
      </div>
    </header>

    <main id="main" class="teaser" aria-labelledby="game-title">
      <h1 id="game-title" class="game-title">
        <picture>
          <source
            media="(max-width: 560px)"
            srcset="./assets/retro-hockey-manager-mark.png"
            width="1774"
            height="887"
          >
          <img
            src="./assets/retro-hockey-manager-logo.png"
            width="1774"
            height="887"
            alt="Retro Hockey Manager"
            fetchpriority="high"
          >
        </picture>
      </h1>
      <div class="center-line" aria-hidden="true"><i></i></div>
      <p class="release" data-i18n="teaser.release">Coming soon</p>
    </main>

    <footer class="site-footer">
      <div>
        <strong>Pakki-Pakki Gaming</strong>
        <span data-i18n="company.about">Independent game studio · Finland</span>
      </div>
      <p>© <span data-current-year>2026</span> Pakki-Pakki Gaming. <span data-i18n="company.rights">All rights reserved.</span></p>
    </footer>
  </body>
</html>
